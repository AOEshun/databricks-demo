bundle:
  name: databricks-demo

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog catalog name (e.g. DEMO_DEV)
  azure_storage_external_location:
    description: UC External Location name wrapping the Azure Storage parquet container

targets:
  dev:
    default: true
    mode: development
    variables:
      catalog: DEMO_DEV  # TODO: maintainer to fill in
      azure_storage_external_location: abfss://sourcetables@tastybytessa.dfs.core.windows.net/source/
