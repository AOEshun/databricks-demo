resources:
  pipelines:
    dlt_integration:
      name: demo-integration

      catalog: ${var.catalog}
      target: INTEGRATION

      clusters:
        - label: default
          autoscale:
            min_workers: 1
            max_workers: 4
            mode: ENHANCED

      libraries:
        - glob:
            include: integration/*.sql

      configuration:
        pipeline.catalog: ${var.catalog}

      development: true
      continuous: false
      channel: CURRENT
      edition: ADVANCED
