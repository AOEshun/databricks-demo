resources:
  pipelines:
    dlt_integration:
      name: demo-silver-integration

      catalog: ${var.catalog}
      target: INTEGRATION

      clusters:
        - label: default
          autoscale:
            min_workers: 1
            max_workers: 4
            mode: ENHANCED

      libraries:
        - notebook:
            path: integration/05_silver_dlt_pipeline.ipynb

      configuration:
        pipeline.catalog: ${var.catalog}

      development: true
      continuous: false
      channel: CURRENT
      edition: ADVANCED
