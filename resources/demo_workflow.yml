resources:
  jobs:
    demo_workflow:
      name: demo-end-to-end-workflow

      email_notifications:
        on_failure:
          - ${var.notification_email}

      environments:
        - environment_key: demo_env
          spec:
            client: "1"

      tasks:
        - task_key: setup
          description: "Catalog, schema's, volume en control table aanmaken (idempotent)"
          environment_key: demo_env
          notebook_task:
            notebook_path: config/00_setup.ipynb
            base_parameters:
              catalog: ${var.catalog}
              parquet_storage_location: ${var.parquet_storage_location}
              catalog_managed_location: ${var.catalog_managed_location}

        - task_key: ingest_azurestorage_full
          description: "Parquet inladen via control table — verwerkt rijen met load_type='full'"
          depends_on:
            - task_key: setup
          environment_key: demo_env
          notebook_task:
            notebook_path: staging/02_ingest_azurestorage.ipynb
            base_parameters:
              catalog: ${var.catalog}
              pipeline_run_id: "{{job.run_id}}"
              mode: full
              reset: "false"

        - task_key: ingest_azurestorage_incremental
          description: "Parquet inladen via control table — verwerkt rijen met load_type='incremental' (Auto Loader)"
          depends_on:
            - task_key: setup
          environment_key: demo_env
          notebook_task:
            notebook_path: staging/02_ingest_azurestorage.ipynb
            base_parameters:
              catalog: ${var.catalog}
              pipeline_run_id: "{{job.run_id}}"
              mode: incremental
              reset: "false"

        - task_key: dlt_integration
          description: "Silver DLT pipeline — type-fixes + snake_case, CDF + apply_changes from Bronze into INTEGRATION"
          depends_on:
            - task_key: ingest_azurestorage_full
            - task_key: ingest_azurestorage_incremental
          pipeline_task:
            pipeline_id: ${resources.pipelines.dlt_integration.id}
