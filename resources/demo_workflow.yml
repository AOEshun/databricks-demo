resources:
  jobs:
    demo_workflow:
      name: demo-end-to-end-workflow

      email_notifications:
        on_failure:
          - ${var.notification_email}

      job_clusters:
        - job_cluster_key: demo_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_D4ds_v5
            num_workers: 1
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}

      tasks:
        - task_key: bootstrap
          description: "Catalog, schema's, volume en control table aanmaken (idempotent)"
          job_cluster_key: demo_cluster
          notebook_task:
            notebook_path: config/00_bootstrap.py
            base_parameters:
              catalog: ${var.catalog}
              azure_storage_external_location: ${var.azure_storage_external_location}

        - task_key: ingest_azurestorage
          description: "Parquet-bestanden inladen via control table (full mode)"
          depends_on:
            - task_key: bootstrap
          job_cluster_key: demo_cluster
          notebook_task:
            notebook_path: staging/02_ingest_azurestorage.py
            base_parameters:
              catalog: ${var.catalog}
              pipeline_run_id: "{{job.run_id}}"
