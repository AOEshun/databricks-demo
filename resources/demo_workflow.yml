resources:
  jobs:
    demo_workflow:
      name: demo-end-to-end-workflow

      email_notifications:
        on_failure:
          - ${var.notification_email}

      environments:
        - environment_key: demo_env
          spec:
            client: "1"

      tasks:
        - task_key: setup
          description: "Catalog, schema's, volume en control table aanmaken (idempotent)"
          environment_key: demo_env
          notebook_task:
            notebook_path: config/00_setup.ipynb
            base_parameters:
              catalog: ${var.catalog}
              parquet_storage_location: ${var.parquet_storage_location}
              catalog_managed_location: ${var.catalog_managed_location}

        - task_key: ingest_azurestorage_full
          description: "Parquet inladen via control table — verwerkt rijen met load_type='full'"
          depends_on:
            - task_key: setup
          environment_key: demo_env
          notebook_task:
            notebook_path: staging/02_ingest_azurestorage.ipynb
            base_parameters:
              catalog: ${var.catalog}
              pipeline_run_id: "{{job.run_id}}"
              mode: full
              reset: "false"

        - task_key: ingest_azurestorage_incremental
          description: "Parquet inladen via control table — verwerkt rijen met load_type='incremental' (Auto Loader)"
          depends_on:
            - task_key: setup
          environment_key: demo_env
          notebook_task:
            notebook_path: staging/02_ingest_azurestorage.ipynb
            base_parameters:
              catalog: ${var.catalog}
              pipeline_run_id: "{{job.run_id}}"
              mode: incremental
              reset: "false"

        - task_key: dlt_integration
          description: "Integration DLT pipeline — Streaming Tables in INTEGRATION via APPLY CHANGES FROM SNAPSHOT"
          depends_on:
            - task_key: ingest_azurestorage_full
            - task_key: ingest_azurestorage_incremental
          pipeline_task:
            pipeline_id: ${resources.pipelines.dlt_integration.id}

        - task_key: apply_views
          description: "Orchestrator — roept 10 view-notebooks aan via dbutils.notebook.run() (sales_line + 9 dims). Niet-DLT, virtualisatie-laag."
          depends_on:
            - task_key: dlt_integration
          environment_key: demo_env
          notebook_task:
            notebook_path: views/07_apply_views.ipynb
            base_parameters:
              catalog: ${var.catalog}

        - task_key: dlt_datamart
          description: "Datamart DLT pipeline — fact_order MV + fact_sales_line MV (Liquid Clustering, leest DWH_ tabellen direct)"
          depends_on:
            - task_key: dlt_integration
          pipeline_task:
            pipeline_id: ${resources.pipelines.dlt_datamart.id}
