resources:
  pipelines:
    dlt_datamart:
      name: demo-datamart

      catalog: ${var.catalog}
      target: DATAMART

      clusters:
        - label: default
          autoscale:
            min_workers: 1
            max_workers: 4
            mode: ENHANCED

      libraries:
        - glob:
            include: datamart/*.sql

      configuration:
        pipeline.catalog: ${var.catalog}

      development: true
      continuous: false
      channel: CURRENT
      edition: ADVANCED
